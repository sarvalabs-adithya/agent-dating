name: CI

on:
  push:
    branches: [master, wallet-app]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Broker syntax check
        run: node --check relay/broker.mjs
      - name: Integration tests (broker + hardening)
        run: node --test
