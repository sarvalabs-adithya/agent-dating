name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Plugin build (typecheck)
        run: npm run build
      - name: Broker syntax check
        run: node --check relay/broker.mjs
      - name: Integration tests (broker + hardening)
        run: node --test
